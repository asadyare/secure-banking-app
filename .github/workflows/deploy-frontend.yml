# Build Vite app and sync to S3 + invalidate CloudFront. Uses OIDC (no long-lived AWS keys).
# Set S3_BUCKET_ID and CLOUDFRONT_DISTRIBUTION_ID from `terraform output` after first apply.

name: Deploy frontend (CD pipeline)

on:
  push:
    branches: [main, master, develop]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.*"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# GitHub Actions: run JavaScript actions on Node 24 (Node 20 runner deprecation).
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-frontend-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Align with Terraform primary region / state bucket (us-east-1). Change if your stack lives elsewhere.
      AWS_REGION: us-east-1
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Verify that the deploy targets (AWS role, S3 bucket id, CloudFront
      # distribution id) are all configured as repository secrets before we
      # attempt OIDC. If any are missing, emit a clear actionable message in
      # the job summary and skip the AWS-dependent steps cleanly rather than
      # surfacing a cryptic `Not authorized` / `NoSuchBucket` error that
      # masks the actual onboarding gap.
      - name: Check deploy secrets
        id: secrets_check
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          BUCKET: ${{ secrets.S3_BUCKET_ID }}
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${ROLE_ARN:-}" ] && missing+=("AWS_DEPLOY_ROLE_ARN or AWS_ROLE_ARN")
          [ -z "${BUCKET:-}" ] && missing+=("S3_BUCKET_ID")
          [ -z "${DIST_ID:-}" ] && missing+=("CLOUDFRONT_DISTRIBUTION_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "### Frontend deploy skipped"
              echo ""
              echo "Required deploy secret(s) not configured on this repository:"
              for s in "${missing[@]}"; do echo "- \`${s}\`"; done
              echo ""
              echo "Populate them from \`terraform output\` after the first Terraform apply. See \`docs/github-oidc-aws.md\` for the bootstrap walkthrough."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Deploy secrets not set (${missing[*]}); skipping AWS deploy."
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS (OIDC)
        if: steps.secrets_check.outputs.secrets_ok == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Prefer a narrow deploy-only role; fall back to AWS_ROLE_ARN if unset.
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # The bucket / distribution referenced by the secrets may not yet exist
      # (e.g. stack destroyed, secrets pointing at an old environment, or
      # Terraform apply has not been run). Detect this explicitly so the
      # failure mode is an actionable summary rather than
      # `NoSuchBucket` / `NoSuchDistribution` mid-sync.
      - name: Verify deploy targets exist
        id: targets_check
        if: steps.secrets_check.outputs.secrets_ok == 'true'
        env:
          BUCKET: ${{ secrets.S3_BUCKET_ID }}
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -uo pipefail
          problems=()

          # Capture stderr from head-bucket so the actual AWS error (wrong
          # region, access denied, NoSuchBucket, etc.) is visible in the log
          # and in the job summary. Masked-secret values would otherwise make
          # a silent failure indistinguishable from a legitimate miss.
          if ! bucket_err=$(aws s3api head-bucket --bucket "${BUCKET}" 2>&1 >/dev/null); then
            echo "head-bucket failed: ${bucket_err}"
            problems+=("S3 bucket not found or inaccessible - ${bucket_err}")
          fi

          if ! dist_err=$(aws cloudfront get-distribution --id "${DIST_ID}" 2>&1 >/dev/null); then
            echo "get-distribution failed: ${dist_err}"
            problems+=("CloudFront distribution not found or inaccessible - ${dist_err}")
          fi

          if [ "${#problems[@]}" -gt 0 ]; then
            {
              echo "### Frontend deploy skipped"
              echo ""
              echo "Deploy targets referenced by the repository secrets are missing or inaccessible:"
              for p in "${problems[@]}"; do echo "- ${p}"; done
              echo ""
              echo "Run \`terraform apply\` to (re)create the static-site stack, then refresh \`S3_BUCKET_ID\` and \`CLOUDFRONT_DISTRIBUTION_ID\` from \`terraform output\`. If the stack already exists, confirm the deploy role has \`s3:ListBucket\` + \`s3:PutObject\` on the bucket and \`cloudfront:GetDistribution\` + \`cloudfront:CreateInvalidation\` on the distribution, and that the bucket lives in \`${AWS_REGION}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Deploy targets missing; skipping S3 sync and CloudFront invalidation."
            echo "targets_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "targets_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to S3
        if: steps.targets_check.outputs.targets_ok == 'true'
        env:
          BUCKET: ${{ secrets.S3_BUCKET_ID }}
        run: |
          aws s3 sync dist/ "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront
        if: steps.targets_check.outputs.targets_ok == 'true'
        env:
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*"
