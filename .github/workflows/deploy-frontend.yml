# Build Vite app and sync to S3 + invalidate CloudFront. Uses OIDC (no long-lived AWS keys).
# Set S3_BUCKET_ID and CLOUDFRONT_DISTRIBUTION_ID from `terraform output` after first apply.

name: Deploy frontend

on:
  push:
    branches: [main, master, develop]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.*"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Align with Terraform primary region / state bucket (us-east-1). Change if your stack lives elsewhere.
      AWS_REGION: us-east-1
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Prefer a narrow deploy-only role; fall back to AWS_ROLE_ARN if unset.
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        env:
          BUCKET: ${{ secrets.S3_BUCKET_ID }}
        run: |
          aws s3 sync dist/ "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront
        env:
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*"
