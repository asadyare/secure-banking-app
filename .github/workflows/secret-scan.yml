# TruffleHog — detect leaked secrets in history and working tree (complement GitHub secret scanning + Gitleaks)
name: Secret scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          extra_args: --only-verified
