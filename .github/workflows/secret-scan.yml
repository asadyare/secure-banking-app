# TruffleHog — detect leaked secrets in history and working tree (complement GitHub secret scanning + Gitleaks)
name: Secret scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        # trufflesecurity/trufflehog does not publish a floating major tag (`v3`).
        # Pin to the full SHA of the current stable release for supply-chain
        # hardening. Tag reference: v3.94.3.
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          path: ./
          extra_args: --only-verified
